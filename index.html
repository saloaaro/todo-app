<!doctype html>
<html lang="fi">
  <head>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        background: #0f172a;
        color: white;
      }

      input {
        padding: 10px;
        width: 200px;
      }

      button {
        padding: 10px;
        margin-left: 5px;
      }

      li {
        margin: 10px;
        list-style: none;
      }
    </style>
    <meta charset="UTF-8" />
    <title>To-Do App</title>
  </head>
  <body>
    <h1>To-Do Lista</h1>

    <input id="taskInput" placeholder="Lisää tehtävä" />
    <button onclick="addTask()">Lisää</button>

    <ul id="taskList"></ul>

    <script src="script.js"></script>
  </body>
</html>
