<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo‑App</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #121212;
      color: #ececec;
      padding: 40px 20px;
    }

    .todo-container {
      width: 100%;
      max-width: 480px;
      background: #1e2630;
      border-radius: 12px;
      padding: 30px 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 1rem;
      background: #2a3340;
      color: #ececec;
    }

    button.add-btn {
      background: #38bdf8;
      border: none;
      padding: 12px 18px;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    button.add-btn:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }

    .list {
      margin-top: 20px;
      list-style: none;
      padding: 0;
    }

    .list li {
      background: #2a3340;
      margin-bottom: 12px;
      padding: 14px 18px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1rem;
      transition: 0.15s ease;
    }

    .list li:hover {
      background: #38414f;
    }

    .list li.completed {
      text-decoration: line-through;
      opacity: 0.7;
    }

    .actions button {
      background: transparent;
      border: none;
      cursor: pointer;
      margin-left: 8px;
      font-size: 1.1rem;
    }

    .actions button.delete {
      color: #ef4444;
    }
    .actions button.complete {
      color: #22c55e;
    }
  </style>
</head>
<body>

  <div class="todo-container">
    <h1>📝 Todo Lista</h1>
    <div class="input-group">
      <input type="text" id="todoInput" placeholder="Lisää uusi tehtävä...">
      <button class="add-btn" onclick="addTodo()">Lisää</button>
    </div>
    <ul class="list" id="todoList"></ul>
  </div>

  <script>
    const input = document.getElementById('todoInput');
    const list = document.getElementById('todoList');

    function loadTodos() {
      const todos = JSON.parse(localStorage.getItem('todos') || '[]');
      list.innerHTML = '';
      todos.forEach((todo, index) => {
        const li = document.createElement('li');
        li.className = todo.completed ? 'completed' : '';
        li.innerHTML = `
          <span>${todo.text}</span>
          <div class="actions">
            <button class="complete" onclick="toggleComplete(${index})">✔️</button>
            <button class="delete" onclick="deleteTodo(${index})">🗑️</button>
          </div>
        `;
        list.appendChild(li);
      });
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      const todos = JSON.parse(localStorage.getItem('todos') || '[]');
      todos.push({ text, completed: false });
      localStorage.setItem('todos', JSON.stringify(todos));
      input.value = '';
      loadTodos();
    }

    function deleteTodo(i) {
      let todos = JSON.parse(localStorage.getItem('todos') || '[]');
      todos.splice(i, 1);
      localStorage.setItem('todos', JSON.stringify(todos));
      loadTodos();
    }

    function toggleComplete(i) {
      let todos = JSON.parse(localStorage.getItem('todos') || '[]');
      todos[i].completed = !todos[i].completed;
      localStorage.setItem('todos', JSON.stringify(todos));
      loadTodos();
    }

    loadTodos();
  </script>

</body>
</html>
